# Builds the Vite app and publishes to GitHub Pages (project site:
# https://<user>.github.io/<repo>/).
#
# Repo setup (one-time):
# 1. Settings → Pages → Build and deployment → Source: GitHub Actions.
# 2. Optional: Settings → Secrets → Actions → VITE_GAS_WEBAPP_URL overrides public/gas-webapp.json.
#    If unset, the committed public/gas-webapp.json in the repo is used.
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # If VITE_GAS_WEBAPP_URL secret is set, it overrides public/gas-webapp.json.
      # If the secret is empty, the committed public/gas-webapp.json is kept (so deploys still work).
      - name: Optionally override public/gas-webapp.json from secret
        env:
          VITE_GAS_WEBAPP_URL: ${{ secrets.VITE_GAS_WEBAPP_URL }}
        run: |
          node -e "
          const fs=require('fs');
          const u=(process.env.VITE_GAS_WEBAPP_URL||'').trim();
          const p='public/gas-webapp.json';
          if (u.startsWith('https://script.google.com')) {
            fs.writeFileSync(p, JSON.stringify({ gasWebAppUrl: u }));
            console.log('gas-webapp.json written from VITE_GAS_WEBAPP_URL secret.');
          } else {
            console.log('Secret empty or invalid — using committed public/gas-webapp.json if present.');
          }
          "

      - name: Warn if gas-webapp.json still has no URL
        run: |
          node -e "
          const fs=require('fs');
          const p='public/gas-webapp.json';
          if (!fs.existsSync(p)) { console.log('::error::Missing public/gas-webapp.json'); process.exit(1); }
          const u=(JSON.parse(fs.readFileSync(p,'utf8')).gasWebAppUrl||'').trim();
          if (!u.startsWith('https://script.google.com')) {
            console.log('::warning::gas-webapp.json has no valid gasWebAppUrl — set GitHub secret VITE_GAS_WEBAPP_URL or commit a valid URL in public/gas-webapp.json');
          }
          "

      - name: Build
        run: npm run build
        env:
          # Must match repository name for project Pages (e.g. /saheli-waiver-form/).
          VITE_BASE_URL: /${{ github.event.repository.name }}/
          VITE_GAS_WEBAPP_URL: ${{ secrets.VITE_GAS_WEBAPP_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
