# Builds the Vite app and publishes to GitHub Pages (project site:
# https://<user>.github.io/<repo>/).
#
# Repo setup (one-time):
# 1. Settings → Pages → Build and deployment → Source: GitHub Actions.
# 2. Settings → Secrets and variables → Actions → New repository secret:
#    VITE_GAS_WEBAPP_URL = your Apps Script web app URL (https://script.google.com/.../exec)
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Same-origin JSON so production builds get the GAS URL even if Vite env inlining fails;
      # still populated from the same secret as VITE_GAS_WEBAPP_URL.
      - name: Write public/gas-webapp.json
        env:
          VITE_GAS_WEBAPP_URL: ${{ secrets.VITE_GAS_WEBAPP_URL }}
        run: >
          node -e "const fs=require('fs');const u=(process.env.VITE_GAS_WEBAPP_URL||'').trim();
          fs.writeFileSync('public/gas-webapp.json',JSON.stringify({gasWebAppUrl:u}));"

      - name: Warn if Apps Script URL is missing
        env:
          VITE_GAS_WEBAPP_URL: ${{ secrets.VITE_GAS_WEBAPP_URL }}
        run: |
          if [ -z "$VITE_GAS_WEBAPP_URL" ]; then
            echo "::warning::Repository secret VITE_GAS_WEBAPP_URL is empty — waiver POST/email will be skipped until you add it (GitHub → Settings → Secrets and variables → Actions)."
          fi

      - name: Build
        run: npm run build
        env:
          # Must match repository name for project Pages (e.g. /saheli-waiver-form/).
          VITE_BASE_URL: /${{ github.event.repository.name }}/
          VITE_GAS_WEBAPP_URL: ${{ secrets.VITE_GAS_WEBAPP_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
